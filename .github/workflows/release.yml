name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package:
    name: Package ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            dist-command: npm run dist:win
            artifacts: |
              dist/*.exe
              dist/*.zip
          - name: macOS (Apple Silicon)
            os: macos-latest
            dist-command: npm run dist:mac
            artifacts: |
              dist/*.dmg
          - name: macOS (Intel)
            os: macos-15-intel
            dist-command: npm run dist:mac
            artifacts: |
              dist/*.dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build installers
        run: ${{ matrix.dist-command }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifacts }}
