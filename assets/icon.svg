<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-label="EasyTools — Workbench icon">
  <!-- Workbench app icon · final
       Graphite chassis with a bone work surface, four rivets, a stenciled
       signal-orange "E", and a tiny status LED at the lower-right.
       The "NO.XX / EASYTOOLS" plate stamping was dropped — it became
       unreadable noise below 64px. The remaining elements all survive
       the smallest dock size with their meaning intact. -->

  <!-- Graphite chassis -->
  <rect x="0" y="0" width="1024" height="1024" rx="232" ry="232" fill="#1A1D21"/>

  <!-- Inner steel hairline -->
  <rect x="20" y="20" width="984" height="984" rx="216" ry="216"
        fill="none" stroke="#3A3F46" stroke-width="2"/>

  <!-- Bone work surface -->
  <rect x="160" y="160" width="704" height="704" rx="36" ry="36" fill="#EDE7DD"/>

  <!-- Bone surface inner hairline -->
  <rect x="172" y="172" width="680" height="680" rx="28" ry="28"
        fill="none" stroke="#C9C2B6" stroke-width="2" opacity="0.7"/>

  <!-- Four corner rivets — slightly larger so they survive 32px -->
  <g fill="#3A3F46">
    <circle cx="206" cy="206" r="12"/>
    <circle cx="818" cy="206" r="12"/>
    <circle cx="206" cy="818" r="12"/>
    <circle cx="818" cy="818" r="12"/>
  </g>

  <!-- Stenciled E in signal orange (centred on the bone plate) -->
  <g fill="#FF5B1F">
    <rect x="358" y="316" width="92" height="392"/>
    <rect x="358" y="316" width="328" height="92"/>
    <rect x="358" y="466" width="284" height="92"/>
    <rect x="358" y="616" width="328" height="92"/>
  </g>

  <!-- Stencil cuts (notches in bone colour) at each joint -->
  <g fill="#EDE7DD">
    <rect x="450" y="316" width="14" height="92"/>
    <rect x="450" y="466" width="14" height="92"/>
    <rect x="450" y="616" width="14" height="92"/>
  </g>

  <!-- Tiny status LED at the lower-right corner of the plate -->
  <circle cx="800" cy="752" r="14" fill="#FF5B1F"/>
</svg>
